<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyCalc</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --blue: #58a6ff;
    --green: #3fb950;
    --yellow: #e3b341;
    --purple: #bc8cff;
    --red: #f85149;
    --orange: #d29922;
    --text: #e6edf3;
    --muted: #8b949e;
    --gutter: #1f2428;
  }

  [data-theme="light"] {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface2: #f0f3f6;
    --border: #d0d7de;
    --blue: #0969da;
    --green: #1a7f37;
    --yellow: #9a6700;
    --purple: #8250df;
    --red: #cf222e;
    --orange: #953800;
    --text: #1f2328;
    --muted: #656d76;
    --gutter: #f6f8fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(88,166,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(63,185,80,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(48,54,61,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48,54,61,0.3) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  .header {
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .dot-green { background: var(--green); }

  .header-title {
    margin-left: auto;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .calc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* REPL / Display */
  .display {
    padding: 20px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
  }

  .display-prompt {
    font-size: 11px;
    color: var(--green);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .display-prompt span { color: var(--blue); }

  .history {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-op {
    color: var(--purple);
  }

  .expression {
    font-size: 22px;
    color: var(--text);
    min-height: 36px;
    word-break: break-all;
    line-height: 1.3;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--blue);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .result-line {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    min-height: 20px;
  }

  .result-line.show {
    color: var(--green);
  }

  .result-line::before {
    content: '# ';
    color: var(--border);
  }

  .copy-btn {
    position: absolute;
    right: 24px;
    bottom: 16px;
    padding: 4px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .display:hover .copy-btn {
    opacity: 1;
  }

  .copy-btn:hover {
    color: var(--blue);
    border-color: var(--blue);
  }

  /* Buttons */
  .keypad {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .btn {
    height: 60px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s ease;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover {
    border-color: #484f58;
    background: #2c3139;
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0) scale(0.96);
    background: var(--border);
  }

  .btn.wide { grid-column: span 2; }

  .btn.op {
    background: rgba(88,166,255,0.08);
    border-color: rgba(88,166,255,0.25);
    color: var(--blue);
  }
  .btn.op:hover {
    background: rgba(88,166,255,0.15);
    border-color: rgba(88,166,255,0.4);
  }

  .btn.fn {
    background: rgba(188,140,255,0.08);
    border-color: rgba(188,140,255,0.2);
    color: var(--purple);
    font-size: 12px;
  }
  .btn.fn:hover {
    background: rgba(188,140,255,0.15);
    border-color: rgba(188,140,255,0.4);
  }

  .btn.equals {
    background: var(--green);
    border-color: var(--green);
    color: #0d1117;
    font-size: 20px;
    font-weight: 700;
  }
  .btn.equals:hover {
    background: #52d464;
    border-color: #52d464;
  }

  .btn.clear {
    background: rgba(248,81,73,0.1);
    border-color: rgba(248,81,73,0.3);
    color: var(--red);
  }
  .btn.clear:hover {
    background: rgba(248,81,73,0.2);
    border-color: rgba(248,81,73,0.5);
  }

  .btn.backspace {
    color: var(--orange);
    font-size: 18px;
  }

  /* Syntax coloring in expression */
  .expr-num { color: var(--blue); }
  .expr-op { color: var(--purple); }
  .expr-paren { color: var(--yellow); }
  .expr-dot { color: var(--text); }

  /* Mode strip */
  .mode-strip {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--gutter);
  }

  .mode-tab {
    flex: 1;
    padding: 8px 4px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-align: center;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .mode-tab.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    background: rgba(88,166,255,0.04);
  }

  /* Error flash */
  .display.error .expression {
    animation: shake 0.3s ease;
    color: var(--red);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
  }

  .footer {
    margin-top: 14px;
    text-align: center;
    font-size: 10px;
    color: var(--border);
    letter-spacing: 0.06em;
  }

  .footer span { color: var(--green); }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="container">
  <div class="header">
    <div class="header-dot dot-red"></div>
    <div class="header-dot dot-yellow"></div>
    <div class="header-dot dot-green"></div>
    <div class="header-title" id="theme-toggle" onclick="toggleTheme()" style="cursor:pointer; user-select:none;">PyCalc v1.0</div>
  </div>

  <div class="calc">
    <div class="mode-strip">
      <div class="mode-tab active" onclick="setMode('basic')">basic</div>
      <div class="mode-tab" onclick="setMode('sci')">scientific</div>
      <div class="mode-tab" onclick="setMode('history')">history</div>
    </div>

    <div class="display" id="display">
      <div class="display-prompt">>>> <span>python</span> calculator.py</div>
      <div class="history" id="history-line"></div>
      <div class="expression" id="expr"><span class="cursor"></span></div>
      <div class="result-line" id="result-line">&nbsp;</div>
      <button class="copy-btn" id="copy-btn" onclick="copyResult()">Copy</button>
    </div>

    <div class="keypad" id="keypad">
      <!-- Row 1 -->
      <button class="btn fn" onclick="insertFn('math.sqrt(')">√</button>
      <button class="btn fn" onclick="insertFn('math.pi')">π</button>
      <button class="btn fn" onclick="insertFn('**')">xʸ</button>
      <button class="btn clear" onclick="clearAll()">AC</button>

      <!-- Row 2 -->
      <button class="btn fn" onclick="insert('(')">(</button>
      <button class="btn fn" onclick="insert(')')">)</button>
      <button class="btn fn" onclick="insertFn('%')">%</button>
      <button class="btn backspace" onclick="backspace()">⌫</button>

      <!-- Row 3 -->
      <button class="btn" onclick="insert('7')">7</button>
      <button class="btn" onclick="insert('8')">8</button>
      <button class="btn" onclick="insert('9')">9</button>
      <button class="btn op" onclick="insert('/')">÷</button>

      <!-- Row 4 -->
      <button class="btn" onclick="insert('4')">4</button>
      <button class="btn" onclick="insert('5')">5</button>
      <button class="btn" onclick="insert('6')">6</button>
      <button class="btn op" onclick="insert('*')">×</button>

      <!-- Row 5 -->
      <button class="btn" onclick="insert('1')">1</button>
      <button class="btn" onclick="insert('2')">2</button>
      <button class="btn" onclick="insert('3')">3</button>
      <button class="btn op" onclick="insert('-')">−</button>

      <!-- Row 6 -->
      <button class="btn" onclick="insert('0')">0</button>
      <button class="btn" onclick="insert('.')">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
      <button class="btn op" onclick="insert('+')">+</button>
    </div>
  </div>

  <div class="footer">powered by <span>JavaScript</span> · inspired by <span>Python REPL</span></div>
</div>

<script>
const math = {
  sqrt: Math.sqrt,
  pi: Math.PI,
  e: Math.E,
  sin: Math.sin,
  cos: Math.cos,
  tan: Math.tan,
  log: Math.log10,
  ln: Math.log,
  abs: Math.abs,
  floor: Math.floor,
  ceil: Math.ceil,
  round: Math.round
};

let expression = '';
let lastResult = null;
let historyList = [];
let currentMode = 'basic';

function toggleTheme() {
  const body = document.body;
  const currentTheme = body.getAttribute('data-theme');
  if (currentTheme === 'light') {
    body.removeAttribute('data-theme');
  } else {
    body.setAttribute('data-theme', 'light');
  }
}

const exprEl = document.getElementById('expr');
const resultEl = document.getElementById('result-line');
const historyLineEl = document.getElementById('history-line');
const displayEl = document.getElementById('display');
const copyBtn = document.getElementById('copy-btn');

function copyResult() {
  const resultText = resultEl.textContent.trim();
  if (resultText && resultText !== '#' && resultText !== 'SyntaxError: invalid syntax') {
    navigator.clipboard.writeText(resultText).then(() => {
      const originalText = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.style.color = 'var(--green)';
      copyBtn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        copyBtn.textContent = originalText;
        copyBtn.style.color = '';
        copyBtn.style.borderColor = '';
      }, 1500);
    });
  }
}

function renderExpr() {
  if (!expression) {
    exprEl.innerHTML = '<span class="cursor"></span>';
    return;
  }
  // Syntax highlight
  let html = expression
    .replace(/(\d+\.?\d*)/g, '<span class="expr-num">$1</span>')
    .replace(/([+\-*/%^])/g, '<span class="expr-op">$1</span>')
    .replace(/([()])/g, '<span class="expr-paren">$1</span>');
  exprEl.innerHTML = html + '<span class="cursor"></span>';
}

function insert(val) {
  expression += val;
  renderExpr();
  previewResult();
}

function insertFn(val) {
  if (val === 'math.pi') {
    expression += '3.14159265358979';
  } else {
    expression += val;
  }
  renderExpr();
  previewResult();
}

function backspace() {
  expression = expression.slice(0, -1);
  renderExpr();
  previewResult();
}

function clearAll() {
  expression = '';
  lastResult = null;
  renderExpr();
  resultEl.textContent = '\u00a0';
  resultEl.className = 'result-line';
  historyLineEl.textContent = '';
  displayEl.classList.remove('error');
}

function clearHistory() {
  historyList = [];
  setMode('history');
}

function previewResult() {
  if (!expression) {
    resultEl.textContent = '\u00a0';
    resultEl.className = 'result-line';
    return;
  }
  try {
    const sanitized = sanitize(expression);
    const res = Function('"use strict"; const math = arguments[0]; return ' + sanitized)(math);
    if (typeof res === 'number' && isFinite(res)) {
      const formatted = formatNum(res);
      resultEl.textContent = formatted;
      resultEl.className = 'result-line show';
    } else {
      resultEl.textContent = '\u00a0';
      resultEl.className = 'result-line';
    }
  } catch {
    resultEl.textContent = '\u00a0';
    resultEl.className = 'result-line';
  }
}

function sanitize(expr) {
  // Replace display operators
  let e = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
  // Allow math.*, digits, operators, parens, dot, space
  if (/[^0-9+\-*/%().^a-zA-Z_\s]/.test(e)) throw new Error('invalid');
  return e;
}

function formatNum(n) {
  if (Number.isInteger(n)) return n.toString();
  // Up to 10 sig digits
  let s = parseFloat(n.toPrecision(10)).toString();
  return s;
}

function calculate() {
  if (!expression) return;
  try {
    const sanitized = sanitize(expression);
    const res = Function('"use strict"; const math = arguments[0]; return ' + sanitized)(math);
    if (typeof res !== 'number' || !isFinite(res)) throw new Error('Invalid result');

    const formatted = formatNum(res);

    // History
    historyList.unshift({ expr: expression, result: formatted });
    if (historyList.length > 20) historyList.pop();

    historyLineEl.innerHTML = `<span class="history-op">=</span> ${formatted}`;

    lastResult = res;
    expression = formatted;
    renderExpr();
    resultEl.textContent = `${formatted}`;
    resultEl.className = 'result-line show';
    displayEl.classList.remove('error');

  } catch {
    displayEl.classList.add('error');
    resultEl.textContent = 'SyntaxError: invalid syntax';
    resultEl.className = 'result-line show';
    resultEl.style.color = 'var(--red)';
    setTimeout(() => {
      displayEl.classList.remove('error');
      resultEl.style.color = '';
    }, 600);
  }
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.toggle('active', ['basic','sci','history'][i] === mode);
  });

  const keypad = document.getElementById('keypad');

  if (mode === 'sci') {
    keypad.innerHTML = `
      <button class="btn fn" onclick="insertFn('math.sin(')">sin</button>
      <button class="btn fn" onclick="insertFn('math.cos(')">cos</button>
      <button class="btn fn" onclick="insertFn('math.tan(')">tan</button>
      <button class="btn clear" onclick="clearAll()">AC</button>

      <button class="btn fn" onclick="insertFn('math.log(')">log</button>
      <button class="btn fn" onclick="insertFn('math.ln(')">ln</button>
      <button class="btn fn" onclick="insertFn('math.sqrt(')">√</button>
      <button class="btn backspace" onclick="backspace()">⌫</button>

      <button class="btn fn" onclick="insertFn('math.pi')">π</button>
      <button class="btn fn" onclick="insertFn('math.e')">e</button>
      <button class="btn fn" onclick="insert('**')">xʸ</button>
      <button class="btn fn" onclick="insertFn('math.abs(')">|x|</button>

      <button class="btn" onclick="insert('7')">7</button>
      <button class="btn" onclick="insert('8')">8</button>
      <button class="btn" onclick="insert('9')">9</button>
      <button class="btn op" onclick="insert('/')">÷</button>

      <button class="btn" onclick="insert('4')">4</button>
      <button class="btn" onclick="insert('5')">5</button>
      <button class="btn" onclick="insert('6')">6</button>
      <button class="btn op" onclick="insert('*')">×</button>

      <button class="btn" onclick="insert('1')">1</button>
      <button class="btn" onclick="insert('2')">2</button>
      <button class="btn" onclick="insert('3')">3</button>
      <button class="btn op" onclick="insert('-')">−</button>

      <button class="btn" onclick="insert('0')">0</button>
      <button class="btn" onclick="insert('.')">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
      <button class="btn op" onclick="insert('+')">+</button>
    `;
  } else if (mode === 'history') {
    if (historyList.length === 0) {
      keypad.innerHTML = `<div style="grid-column:span 4;padding:24px;text-align:center;color:var(--muted);font-size:12px;">No history yet.<br>Perform calculations first.</div>`;
    } else {
      let rows = historyList.slice(0, 8).map(h => `
        <div onclick="loadHistory('${h.result}')" style="grid-column:span 4;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;transition:background 0.1s;" onmouseover="this.style.background='#2c3139'" onmouseout="this.style.background='var(--surface2)'">
          <span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${h.expr}</span>
          <span style="color:var(--green)">= ${h.result}</span>
        </div>
      `).join('');
      keypad.innerHTML = rows + `
        <button class="btn clear wide" onclick="clearHistory()" style="grid-column: span 4; height: 40px; margin-top: 8px; font-size: 11px;">Clear History</button>
      `;
    }
  } else {
    // Basic
    keypad.innerHTML = `
      <button class="btn fn" onclick="insertFn('math.sqrt(')">√</button>
      <button class="btn fn" onclick="insertFn('math.pi')">π</button>
      <button class="btn fn" onclick="insert('**')">xʸ</button>
      <button class="btn clear" onclick="clearAll()">AC</button>

      <button class="btn fn" onclick="insert('(')">(</button>
      <button class="btn fn" onclick="insert(')')">)</button>
      <button class="btn fn" onclick="insert('%')">%</button>
      <button class="btn backspace" onclick="backspace()">⌫</button>

      <button class="btn" onclick="insert('7')">7</button>
      <button class="btn" onclick="insert('8')">8</button>
      <button class="btn" onclick="insert('9')">9</button>
      <button class="btn op" onclick="insert('/')">÷</button>

      <button class="btn" onclick="insert('4')">4</button>
      <button class="btn" onclick="insert('5')">5</button>
      <button class="btn" onclick="insert('6')">6</button>
      <button class="btn op" onclick="insert('*')">×</button>

      <button class="btn" onclick="insert('1')">1</button>
      <button class="btn" onclick="insert('2')">2</button>
      <button class="btn" onclick="insert('3')">3</button>
      <button class="btn op" onclick="insert('-')">−</button>

      <button class="btn" onclick="insert('0')">0</button>
      <button class="btn" onclick="insert('.')">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
      <button class="btn op" onclick="insert('+')">+</button>
    `;
  }
}

function loadHistory(val) {
  expression = val;
  setMode('basic');
  renderExpr();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (currentMode === 'history') return;
  if (e.key >= '0' && e.key <= '9') insert(e.key);
  else if (['+','-','*','/','(',')','.','^','%'].includes(e.key)) insert(e.key);
  else if (e.key === 'Enter') calculate();
  else if (e.key === 'Backspace') backspace();
  else if (e.key === 'Escape') clearAll();
});
</script>
</body>
</html>
